name: VD2026_tclv1.yml
model_type: MultiFrameVDModel
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test:
    name: MultiFrameVD
    type: MultiFrameVDPairedImageDataset
    dataroot_gt: ../datasets/homo/tcl/test/target
    dataroot_lq: ../datasets/homo/tcl/test/source
    io_backend:
      type: disk
    batch_size: 2
    num_worker: 4

# network structures
network:
  type: MTNet

# path
path:
  pretrain_network: experiments/base1_tclv1.yml/models/net_100000.pth
  strict_load: false
  param_key: 'params_ema'

# validation settings
val:
  save_img: true
  metrics:
    psnr:
      type: calculate_vd_psnr
    ssim:
      type: calculate_vd_ssim
    lpips:
      type: calculate_lpips
      better: lower
